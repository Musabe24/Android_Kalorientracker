name: Android CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'V*'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36.1" \
            "build-tools;36.0.0"

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build (first pipeline check)
        run: ./gradlew build --stacktrace --no-daemon

  release:
    name: Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36.1" \
            "build-tools;36.0.0"

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Validate release signing secrets
        id: signing_secrets
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing_vars=()
          for var in RELEASE_KEYSTORE_BASE64 RELEASE_KEYSTORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              missing_vars+=("$var")
            fi
          done

          if [ ${#missing_vars[@]} -gt 0 ]; then
            echo "Missing release signing secrets: ${missing_vars[*]}"
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_secrets=true" >> "$GITHUB_OUTPUT"

      - name: Create keystore file
        if: steps.signing_secrets.outputs.has_secrets == 'true'
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build release APK
        if: steps.signing_secrets.outputs.has_secrets == 'true'
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -PrequireReleaseSigning=true \
            -PreleaseKeystoreFile="$RUNNER_TEMP/release.keystore" \
            -PreleaseKeystorePassword="$RELEASE_KEYSTORE_PASSWORD" \
            -PreleaseKeyAlias="$RELEASE_KEY_ALIAS" \
            -PreleaseKeyPassword="$RELEASE_KEY_PASSWORD" \
            --stacktrace \
            --no-daemon

      - name: Verify signed release APK exists
        if: steps.signing_secrets.outputs.has_secrets == 'true'
        run: |
          set -euo pipefail

          signed_apk="app/build/outputs/apk/release/app-release.apk"
          unsigned_apk="app/build/outputs/apk/release/app-release-unsigned.apk"

          test -f "$signed_apk"
          if [ -f "$unsigned_apk" ]; then
            echo "Unexpected unsigned APK found: $unsigned_apk"
            exit 1
          fi

      - name: Publish GitHub release with APK
        if: steps.signing_secrets.outputs.has_secrets == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk

      - name: Skip release when signing secrets are unavailable
        if: steps.signing_secrets.outputs.has_secrets != 'true'
        run: echo "Skipping release APK build because signing secrets are not configured."
